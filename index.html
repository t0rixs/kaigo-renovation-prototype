<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>介護住宅改修 図面・見積プロトタイプ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="drawing">
    <main class="app-shell">
      <aside class="palette" aria-label="部品パレット">
        <div class="brand">
          <span class="brand-mark">改</span>
          <div>
            <h1>住宅改修</h1>
            <p>図面 + 簡易見積</p>
          </div>
        </div>

        <nav class="page-nav" aria-label="ページ切り替え">
          <button class="page-tab" data-page-target="basic">基本情報</button>
          <button class="page-tab" data-page-target="products">品番</button>
          <button class="page-tab active" data-page-target="drawing">図面</button>
          <button class="page-tab" data-page-target="estimate">見積もり</button>
        </nav>

        <section class="palette-section drawing-tool-section">
          <h2>部屋</h2>
          <div class="tool-grid">
            <button class="tool active" data-tool="select">選択</button>
            <button class="tool" data-tool="room" data-label="部屋">部屋</button>
            <button class="tool" data-tool="room" data-label="廊下">廊下</button>
            <button class="tool" data-tool="room" data-label="玄関">玄関</button>
          </div>
        </section>

        <section class="palette-section drawing-tool-section">
          <h2>設備アイコン</h2>
          <div class="icon-list" id="fixtureTools"></div>
        </section>

        <section class="palette-section drawing-tool-section">
          <h2>施工</h2>
          <div class="tool-grid">
            <button class="tool action" data-tool="rail">手すり</button>
            <button class="tool action" data-tool="slope">スロープ</button>
            <button class="tool action" data-tool="step">段差</button>
          </div>
        </section>

        <section class="palette-section compact drawing-tool-section">
          <h2>基本情報</h2>
          <label>お客様名<input id="customerName" value="山田 太郎" /></label>
          <label>住所<input id="customerAddress" value="福岡市西区小戸1丁目" /></label>
          <label>被保険者番号<input id="insuredNumber" value="0000123456" /></label>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <strong>施工箇所図面</strong>
            <span>1マス = 100mm</span>
          </div>
          <div class="topbar-actions">
            <div class="zoom-controls" aria-label="図面倍率">
              <button id="zoomOut" type="button">縮小</button>
              <strong id="zoomLevel">100%</strong>
              <button id="zoomIn" type="button">拡大</button>
              <button id="zoomReset" type="button">等倍</button>
            </div>
            <button id="fitDemo">サンプル配置</button>
            <button id="clearSelection">選択解除</button>
            <button id="deleteSelected" class="danger-button">削除</button>
          </div>
        </header>

        <div class="canvas-wrap">
          <div id="canvasStage" class="canvas-stage">
            <div id="canvas" class="canvas" aria-label="図面キャンバス">
              <svg id="lineLayer" class="line-layer"></svg>
              <div class="scale-card">
                <span>100mm</span>
                <i></i>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="page basic-page">
        <div class="page-card">
          <header class="page-heading">
            <div>
              <h2>基本情報</h2>
              <p>Excelの「基本情報」と見積表紙に反映する項目です。</p>
            </div>
          </header>
          <div class="form-grid">
            <label>お客様名<input id="basicCustomerName" value="山田 太郎" /></label>
            <label>フリガナ<input id="basicCustomerKana" value="ヤマダ タロウ" /></label>
            <label>住所<input id="basicAddress" value="福岡市西区小戸1丁目" /></label>
            <label>電話番号<input id="basicPhone" value="092-000-0000" /></label>
            <label>被保険者番号<input id="basicInsuredNumber" value="0000123456" /></label>
            <label>現調依頼日<input id="basicSurveyDate" type="date" /></label>
            <label>生年月日<input id="basicBirthDate" type="date" /></label>
            <label>ご家族宛名<input id="basicFamilyAddressee" value="山田 花子 様" /></label>
            <label>工事名<input id="basicProjectName" value="山田 太郎様邸 住宅改修工事" /></label>
            <label>工事場所<input id="basicConstructionPlace" value="福岡市西区小戸1丁目" /></label>
            <label>見積有効期限<input id="basicEstimateValid" value="発行日より30日" /></label>
            <label>支払条件<input id="basicPaymentTerms" value="完了後一括" /></label>
          </div>
        </div>
      </section>

      <section class="page products-page">
        <div class="page-card">
          <header class="page-heading">
            <div>
              <h2>品番</h2>
              <p>今はExcelの商品リスト相当のサンプル品番です。あとで追加・編集できる管理画面にします。</p>
            </div>
          </header>
          <form id="productForm" class="product-form">
            <label>品番<input id="newProductCode" placeholder="例: BD-122" required /></label>
            <label>商品名<input id="newProductName" placeholder="例: 35φ アッシュ丸棒" required /></label>
            <label>
              カテゴリ
              <select id="newProductType">
                <option value="rail">手すり</option>
                <option value="slope">スロープ</option>
                <option value="step">段差</option>
              </select>
            </label>
            <label>仕入<input id="newProductCost" type="number" min="0" step="1" value="0" /></label>
            <label>単価<input id="newProductPrice" type="number" min="0" step="1" value="0" /></label>
            <label>単位<input id="newProductUnit" value="式" /></label>
            <button id="addProduct" type="submit">品番を追加</button>
          </form>
          <div class="product-table-wrap">
            <table class="product-table">
              <thead>
                <tr>
                  <th>品番</th>
                  <th>商品名</th>
                  <th>カテゴリ</th>
                  <th>仕入</th>
                  <th>単価</th>
                  <th>単位</th>
                </tr>
              </thead>
              <tbody id="productTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="page estimate-page">
        <div class="page-card">
          <header class="page-heading">
            <div>
              <h2>見積もり</h2>
              <p>図面に配置した手すり・スロープ・段差解消から内訳を作ります。</p>
            </div>
          </header>
          <div class="estimate-page-layout">
            <section>
              <h3>見積明細</h3>
              <div id="estimatePageList" class="estimate-list large"></div>
            </section>
            <section>
              <h3>経費・合計</h3>
              <div id="estimatePageTotals" class="totals page-totals"></div>
            </section>
          </div>
        </div>
      </section>

      <aside class="inspector">
        <section class="panel">
          <h2>選択中の編集</h2>
          <div id="emptyInspector" class="empty">部屋・設備・施工線を選択してください。</div>
          <form id="inspectorForm" class="inspector-form hidden">
            <label>種別<input id="editType" disabled /></label>
            <label>表示名<input id="editLabel" /></label>
            <label>場所<input id="editPlace" /></label>
            <div class="two-cols">
              <label>幅(mm)<input id="editWidth" type="number" min="100" step="100" /></label>
              <label>奥行(mm)<input id="editHeight" type="number" min="100" step="100" /></label>
            </div>
            <div class="rotation-row">
              <label>回転(度)<input id="editRotation" type="number" step="15" /></label>
              <button id="rotateRight" type="button">90度回転</button>
            </div>
            <button id="deleteSelectedInspector" class="danger-button full-width" type="button">選択中のものを削除</button>
            <label>品番<select id="editProduct"></select></label>
            <div class="two-cols">
              <label>長さ(mm)<input id="editLength" type="number" min="0" step="10" /></label>
              <label>数量<input id="editQuantity" type="number" min="1" step="1" /></label>
            </div>
            <div class="two-cols">
              <label>単価<input id="editUnitPrice" type="number" min="0" step="100" /></label>
              <label>値引<input id="editDiscount" type="number" min="0" step="100" /></label>
            </div>
            <label>備考<textarea id="editNote" rows="3"></textarea></label>
          </form>
        </section>

        <section class="panel estimate-panel">
          <div class="panel-heading">
            <h2>簡易見積</h2>
            <span id="lineCount">0件</span>
          </div>
          <div class="estimate-list" id="estimateList"></div>
          <div class="cost-settings">
            <label>諸経費<input id="expenseMisc" type="number" value="8000" /></label>
            <label>現場管理費<input id="expenseManage" type="number" value="5000" /></label>
            <label>下地補強<input id="expenseBase" type="number" value="0" /></label>
            <label>処分費<input id="expenseDispose" type="number" value="0" /></label>
            <label>運搬費<input id="expenseCarry" type="number" value="3000" /></label>
          </div>
          <div class="totals">
            <div><span>小計</span><strong id="subtotal">0円</strong></div>
            <div><span>経費</span><strong id="expenseTotal">0円</strong></div>
            <div><span>消費税</span><strong id="tax">0円</strong></div>
            <div class="grand"><span>合計</span><strong id="grandTotal">0円</strong></div>
          </div>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
